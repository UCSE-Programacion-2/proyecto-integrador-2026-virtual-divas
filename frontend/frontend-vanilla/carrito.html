<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Carrito de Compras | PintuNort</title>
  <link rel="stylesheet" href="src/styles/variables.css" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .seccion-carrito { padding: var(--spacing-xl) 0; }
    .tabla-carrito { width: 100%; border-collapse: collapse; margin-top: var(--spacing-lg); background: var(--color-surface); border-radius: var(--border-radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
    .tabla-carrito th, .tabla-carrito td { padding: var(--spacing-md); text-align: left; border-bottom: 1px solid var(--color-border); }
    .tabla-carrito th { background-color: var(--color-primary); color: var(--color-blanco); }
    .resumen-compra { display: flex; flex-direction: column; align-items: flex-end; margin-top: var(--spacing-lg); gap: var(--spacing-sm); }
    .total-caja { font-size: var(--font-size-lg); font-weight: var(--font-weight-bold); }
  </style>
</head>
<body>
  <main class="contenedor seccion-carrito">
    <h2>Tu Carrito de Compras</h2>
    <table class="tabla-carrito">
      <thead>
        <tr>
          <th>Producto</th>
          <th>Cantidad</th>
          <th>Precio Unitario</th>
          <th>Subtotal</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Látex Interior Premium (20L)</td>
          <td>1</td>
          <td>$45.000</td>
          <td>$45.000</td>
        </tr>
      </tbody>
    </table>
    <div class="resumen-compra">
      <div class="total-caja">Total a pagar: <span style="color: var(--color-secondary);">$45.000</span></div>
      <button class="btn btn-primario" style="margin-top: var(--spacing-sm);">Iniciar Pago</button>
    </div>
  </main>
</body>
</html>
